# jerry
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>貼文產生器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c5cfc;
    --accent2: #c084fc;
    --accent-glow: rgba(124, 92, 252, 0.25);
    --text: #f0eeff;
    --text-muted: #8b8aa0;
    --text-dim: #4a4960;
    --success: #34d399;
    --tag-bg: rgba(124, 92, 252, 0.12);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
    font-weight: 300;
  }

  main {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 0;
    height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* ── Left Panel ── */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-column: column;
    flex-direction: column;
    gap: 20px;
  }

  .panel-left::-webkit-scrollbar { width: 4px; }
  .panel-left::-webkit-scrollbar-track { background: transparent; }
  .panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Right Panel ── */
  .panel-right {
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    background: var(--bg);
  }

  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-track { background: transparent; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Form Sections ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  input[type="text"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    resize: none;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  textarea { min-height: 90px; }

  select option { background: var(--surface2); }

  /* ── Platform Pills ── */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .platform-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface2);
    user-select: none;
  }

  .platform-pill:hover { border-color: var(--accent); }

  .platform-pill.active {
    border-color: var(--accent);
    background: var(--tag-bg);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .platform-pill input { display: none; }

  .platform-icon { font-size: 16px; }

  .platform-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  /* ── Tone Buttons ── */
  .tone-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .tone-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
  }

  .tone-btn:hover { border-color: var(--accent); color: var(--text); }

  .tone-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
  }

  /* ── Generate Button ── */
  .btn-generate {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Count ── */
  .count-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .count-label { font-size: 13px; color: var(--text-muted); }

  .count-input {
    width: 64px !important;
    text-align: center;
    padding: 7px 8px !important;
  }

  /* ── Right: empty state ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
    min-height: 300px;
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-title { font-size: 17px; color: var(--text-muted); font-weight: 500; }
  .empty-desc { font-size: 13px; line-height: 1.7; max-width: 320px; }

  /* ── Result Cards ── */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .results-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
  }

  .results-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.18s;
  }

  .btn-clear:hover { border-color: #ef4444; color: #ef4444; }

  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    transition: border-color 0.2s;
  }

  .post-card:hover { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-platform {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  .btn-icon.copied { border-color: var(--success); color: var(--success); }

  .card-body {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-footer {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .char-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .tag-chip {
    font-size: 11px;
    color: var(--accent2);
    background: var(--tag-bg);
    border: 1px solid rgba(192, 132, 252, 0.2);
    border-radius: 20px;
    padding: 2px 9px;
  }

  /* ── Loading ── */
  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  .error-card {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 13px;
    color: #fca5a5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  /* ── Scrollbar ── */
  .panel-right::-webkit-scrollbar { width: 4px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; overflow: auto; }
    .panel-left { height: auto; }
    .panel-right { min-height: 50vh; }
    header { padding: 14px 20px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-icon">✦</div>
    <span class="logo-text">貼文產生器</span>
    <span class="logo-sub">AI Powered · Claude Sonnet</span>
  </header>

  <main>
    <!-- ──────── Left Panel ──────── -->
    <div class="panel-left">

      <!-- Topic -->
      <div class="form-group">
        <div class="section-label">主題內容</div>
        <label for="topic">你想分享什麼？</label>
        <textarea id="topic" placeholder="例如：推薦一款好用的筆記 App、分享週末去宜蘭旅遊的心得、介紹最新 AI 工具..."></textarea>
      </div>

      <!-- Platform -->
      <div class="form-group">
        <div class="section-label">發布平台</div>
        <div class="platform-grid" id="platformGrid">
          <label class="platform-pill active">
            <input type="checkbox" value="Instagram" checked />
            <span class="platform-icon">📸</span>
            <span class="platform-name">Instagram</span>
          </label>
          <label class="platform-pill">
            <input type="checkbox" value="Facebook" />
            <span class="platform-icon">👥</span>
            <span class="platform-name">Facebook</span>
          </label>
          <label class="platform-pill">
            <input type="checkbox" value="LinkedIn" />
            <span class="platform-icon">💼</span>
            <span class="platform-name">LinkedIn</span>
          </label>
          <label class="platform-pill">
            <input type="checkbox" value="Twitter/X" />
            <span class="platform-icon">🐦</span>
            <span class="platform-name">Twitter / X</span>
          </label>
          <label class="platform-pill">
            <input type="checkbox" value="Threads" />
            <span class="platform-icon">🧵</span>
            <span class="platform-name">Threads</span>
          </label>
          <label class="platform-pill">
            <input type="checkbox" value="PTT/論壇" />
            <span class="platform-icon">💬</span>
            <span class="platform-name">PTT / 論壇</span>
          </label>
        </div>
      </div>

      <!-- Tone -->
      <div class="form-group">
        <div class="section-label">貼文風格</div>
        <div class="tone-row" id="toneRow">
          <button class="tone-btn active" data-tone="輕鬆活潑">輕鬆活潑</button>
          <button class="tone-btn" data-tone="專業正式">專業正式</button>
          <button class="tone-btn" data-tone="幽默搞笑">幽默搞笑</button>
          <button class="tone-btn" data-tone="溫暖療癒">溫暖療癒</button>
          <button class="tone-btn" data-tone="知識分享">知識分享</button>
          <button class="tone-btn" data-tone="故事敘述">故事敘述</button>
          <button class="tone-btn" data-tone="勵志激勵">勵志激勵</button>
          <button class="tone-btn" data-tone="直白犀利">直白犀利</button>
        </div>
      </div>

      <!-- Hashtag & Emoji -->
      <div class="form-group">
        <div class="section-label">附加設定</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <label class="platform-pill" id="hashtagPill" style="flex:1; min-width:120px;">
            <input type="checkbox" id="includeHashtag" checked />
            <span class="platform-icon">🏷️</span>
            <span class="platform-name">加入 Hashtag</span>
          </label>
          <label class="platform-pill" id="emojiPill" style="flex:1; min-width:120px;">
            <input type="checkbox" id="includeEmoji" checked />
            <span class="platform-icon">😊</span>
            <span class="platform-name">加入 Emoji</span>
          </label>
        </div>
      </div>

      <!-- Extra instruction -->
      <div class="form-group">
        <label for="extra">補充說明（選填）</label>
        <input type="text" id="extra" placeholder="例如：請用第一人稱、不超過 150 字..." />
      </div>

      <div class="divider"></div>

      <!-- Count + Generate -->
      <div class="count-row">
        <span class="count-label">產生數量</span>
        <input type="number" id="genCount" class="count-input" value="3" min="1" max="6" />
        <span class="count-label">篇</span>
      </div>

      <button class="btn-generate" id="btnGenerate" onclick="generatePosts()">
        <span id="btnIcon">✦</span>
        <span id="btnText">產生貼文</span>
      </button>

    </div>

    <!-- ──────── Right Panel ──────── -->
    <div class="panel-right" id="panelRight">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">還沒有貼文</div>
        <div class="empty-desc">在左邊填入主題、選好平台和風格，<br>按下「產生貼文」即可自動生成多種版本。</div>
      </div>
    </div>
  </main>
</div>

<script>
  // ── Platform pill toggle ──
  document.querySelectorAll('.platform-grid .platform-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const cb = pill.querySelector('input[type=checkbox]');
      pill.classList.toggle('active', cb.checked);
    });
  });

  // Extra pills (hashtag / emoji)
  ['hashtagPill', 'emojiPill'].forEach(id => {
    const pill = document.getElementById(id);
    pill.addEventListener('click', () => {
      const cb = pill.querySelector('input[type=checkbox]');
      pill.classList.toggle('active', cb.checked);
    });
  });
  document.getElementById('hashtagPill').classList.add('active');
  document.getElementById('emojiPill').classList.add('active');

  // ── Tone toggle ──
  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // ── Helpers ──
  function getSelectedPlatforms() {
    return Array.from(document.querySelectorAll('.platform-grid input[type=checkbox]:checked'))
      .map(cb => cb.value);
  }

  function getActiveTone() {
    const btn = document.querySelector('.tone-btn.active');
    return btn ? btn.dataset.tone : '輕鬆活潑';
  }

  function setLoading(is) {
    const btn = document.getElementById('btnGenerate');
    const icon = document.getElementById('btnIcon');
    const text = document.getElementById('btnText');
    btn.disabled = is;
    if (is) {
      icon.textContent = '⏳';
      text.textContent = '生成中…';
    } else {
      icon.textContent = '✦';
      text.textContent = '產生貼文';
    }
  }

  function showError(msg) {
    const panel = document.getElementById('panelRight');
    const err = document.createElement('div');
    err.className = 'error-card';
    err.innerHTML = `<span>⚠️</span><span>${msg}</span>`;
    panel.prepend(err);
    setTimeout(() => err.remove(), 6000);
  }

  function charCountLabel(n) {
    if (n <= 280) return `${n} 字`;
    return `${n} 字`;
  }

  async function copyText(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = '✓ 已複製';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '複製';
        btn.classList.remove('copied');
      }, 2000);
    } catch {
      btn.textContent = '複製失敗';
    }
  }

  function renderCard(postText, platform, index) {
    const card = document.createElement('div');
    card.className = 'post-card';

    const icons = {
      'Instagram': '📸', 'Facebook': '👥', 'LinkedIn': '💼',
      'Twitter/X': '🐦', 'Threads': '🧵', 'PTT/論壇': '💬'
    };

    const charCount = postText.length;
    const hashtags = (postText.match(/#[\w\u4e00-\u9fff]+/g) || []).slice(0, 3);

    card.innerHTML = `
      <div class="card-header">
        <div class="card-platform">
          <span>${icons[platform] || '📝'}</span>
          <span>${platform}</span>
          <span style="color:var(--text-dim); font-weight:400; margin-left:4px;">· 版本 ${index}</span>
        </div>
        <div class="card-actions">
          <button class="btn-icon copy-btn">複製</button>
        </div>
      </div>
      <div class="card-body">${postText}</div>
      <div class="card-footer">
        ${hashtags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
        <span class="char-count">${charCountLabel(charCount)}</span>
      </div>
    `;

    card.querySelector('.copy-btn').addEventListener('click', function () {
      copyText(postText, this);
    });

    return card;
  }

  // ── Main generate function ──
  async function generatePosts() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) {
      document.getElementById('topic').focus();
      document.getElementById('topic').style.borderColor = '#ef4444';
      setTimeout(() => document.getElementById('topic').style.borderColor = '', 2000);
      return;
    }

    const platforms = getSelectedPlatforms();
    if (platforms.length === 0) {
      showError('請至少選擇一個發布平台。');
      return;
    }

    const tone = getActiveTone();
    const includeHashtag = document.getElementById('includeHashtag').checked;
    const includeEmoji = document.getElementById('includeEmoji').checked;
    const extra = document.getElementById('extra').value.trim();
    const count = Math.min(Math.max(parseInt(document.getElementById('genCount').value) || 3, 1), 6);

    setLoading(true);

    const panel = document.getElementById('panelRight');
    document.getElementById('emptyState')?.remove();

    // Show loading placeholder
    const loadingCard = document.createElement('div');
    loadingCard.className = 'loading-card';
    loadingCard.id = 'loadingCard';
    loadingCard.innerHTML = `<div class="spinner"></div>AI 正在幫你生成貼文，請稍候…`;
    panel.prepend(loadingCard);

    const platformDescMap = {
      'Instagram': '適合圖文分享，可加 emoji 和多個 hashtag，風格偏視覺與情感',
      'Facebook': '適合長文或中等長度，可加 hashtag，偏社群分享',
      'LinkedIn': '適合專業職場內容，語氣較正式，hashtag 不宜過多',
      'Twitter/X': '必須在 280 字以內，簡短有力，可加 1-3 個 hashtag',
      'Threads': '風格輕鬆，中短文，可加少量 hashtag',
      'PTT/論壇': '無需 hashtag，可用括號強調重點，語氣較口語直接'
    };

    const platformInstructions = platforms.map(p =>
      `- ${p}：${platformDescMap[p] || '一般社群平台'}`
    ).join('\n');

    const systemPrompt = `你是一位專業的社群媒體文案寫手，擅長為不同平台撰寫吸引人的貼文。請根據使用者提供的主題和需求，直接輸出格式化的 JSON 陣列。

回應格式（只回傳 JSON，不要有任何其他文字或 markdown 標記）：
[
  {"platform": "平台名稱", "version": 1, "content": "貼文內容"},
  ...
]`;

    const hashtagNote = includeHashtag
      ? '請在適當位置加入相關 hashtag（Twitter/X 最多 3 個，Instagram 可以 5-10 個，LinkedIn 2-3 個，Threads 2-3 個）。'
      : '不要加入任何 hashtag。';

    const emojiNote = includeEmoji
      ? '適當加入 emoji 讓貼文更生動，但不要過度使用。'
      : '不要加入任何 emoji。';

    const userPrompt = `主題：${topic}

平台需求：
${platformInstructions}

風格要求：${tone}
${hashtagNote}
${emojiNote}
${extra ? `額外要求：${extra}` : ''}

請為每個平台各生成 ${count} 個不同版本的貼文，版本間要有明顯差異（例如：切入角度不同、開頭方式不同、結構不同）。
總共需要 ${platforms.length * count} 篇貼文。
直接回傳 JSON 陣列，不要有任何說明文字。`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `API 錯誤 ${response.status}`);
      }

      const data = await response.json();
      const raw = data.content?.map(b => b.text || '').join('') || '';

      // Parse JSON
      let posts = [];
      try {
        const cleaned = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
        posts = JSON.parse(cleaned);
      } catch {
        throw new Error('無法解析 AI 回應，請重試。');
      }

      // Remove loading
      document.getElementById('loadingCard')?.remove();

      // Build results section
      const section = document.createElement('div');
      section.style.display = 'flex';
      section.style.flexDirection = 'column';
      section.style.gap = '16px';

      const header = document.createElement('div');
      header.className = 'results-header';
      header.innerHTML = `
        <span class="results-title">生成結果</span>
        <span class="results-count">${posts.length} 篇</span>
        <button class="btn-clear" id="clearBtn">清除全部</button>
      `;
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'cards-grid';

      // Group by platform
      platforms.forEach(platform => {
        const platformPosts = posts.filter(p => p.platform === platform);
        platformPosts.forEach((post, idx) => {
          grid.appendChild(renderCard(post.content, post.platform, idx + 1));
        });
      });

      section.appendChild(grid);
      panel.prepend(section);

      section.querySelector('#clearBtn').addEventListener('click', () => {
        section.remove();
        if (!panel.querySelector('.post-card, .loading-card')) {
          const empty = document.createElement('div');
          empty.id = 'emptyState';
          empty.className = 'empty-state';
          empty.innerHTML = `
            <div class="empty-icon">✦</div>
            <div class="empty-title">還沒有貼文</div>
            <div class="empty-desc">在左邊填入主題、選好平台和風格，<br>按下「產生貼文」即可自動生成多種版本。</div>`;
          panel.appendChild(empty);
        }
      });

    } catch (err) {
      document.getElementById('loadingCard')?.remove();
      showError(`產生失敗：${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  // Enter key on topic
  document.getElementById('topic').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) generatePosts();
  });
</script>
</body>
</html>
